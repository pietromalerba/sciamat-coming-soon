<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sciamat Milano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8CC80;
    --gold-dim: #8A6E30;
    --white: #F5F0E8;
    --black: #050505;
    --gray: #1a1a1a;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--black);
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, background 0.3s;
  }
  .cursor-ring {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.25s ease, width 0.3s, height 0.3s;
  }

  /* Intro overlay */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
  }

  .intro-line {
    overflow: hidden;
    height: 1px;
    background: var(--gold-dim);
    width: 0;
    margin: 0 auto;
  }

  .intro-wordmark {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(10px, 2vw, 16px);
    letter-spacing: 0.6em;
    color: var(--gold);
    opacity: 0;
    text-transform: uppercase;
    text-align: center;
    padding: 1.5rem 0;
  }

  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(48px, 10vw, 96px);
    letter-spacing: 0.15em;
    color: var(--white);
    opacity: 0;
    text-transform: uppercase;
    text-align: center;
    line-height: 1;
  }

  /* Main page */
  #main {
    position: fixed;
    inset: 0;
    opacity: 0;
  }

  /* Hero */
  .hero {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    transform: scale(1.08);
    transform-origin: center;
    filter: contrast(1.05) brightness(0.92);
    transition: transform 8s ease-out;
  }

  .hero-img.zoomed {
    transform: scale(1.0);
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 20%, transparent 65%, rgba(0,0,0,0.85) 100%);
  }

  /* Noise texture overlay */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* Top nav */
  .nav {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2.5rem 4rem;
    z-index: 10;
  }

  .nav-claim {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: rgba(245,240,232,0.5);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
  }

  .nav-city {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--gold-dim);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 1s ease 0.7s, transform 1s ease 0.7s;
  }

  .nav.visible .nav-claim,
  .nav.visible .nav-city {
    opacity: 1;
    transform: translateY(0);
  }

  /* Center logo area */
  .center-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 4rem;
    z-index: 10;
  }

  /* Coming soon — centered above logo */
  .coming-soon-center {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    z-index: 10;
    text-align: center;
    opacity: 0;
    transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
    white-space: nowrap;
  }

  .coming-soon-center.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .coming-soon-main {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: clamp(16px, 2.8vw, 32px);
    letter-spacing: 0.55em;
    color: #ffffff;
    text-transform: uppercase;
    text-shadow: 0 2px 30px rgba(0,0,0,0.8), 0 0 60px rgba(0,0,0,0.5);
  }

  /* Gold separator line */
  .separator {
    width: 1px;
    height: 0;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin-bottom: 2rem;
    transition: height 1.2s ease 0.3s;
  }

  .separator.visible {
    height: 60px;
  }

  /* Social icons row */
  .social-row {
    display: flex;
    align-items: center;
    gap: 2.5rem;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s ease 0.8s, transform 1s ease 0.8s;
  }

  .social-row.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .social-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    cursor: none;
  }

  .social-icon {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, background 0.3s;
  }

  .social-link:hover .social-icon {
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
  }

  .social-icon svg {
    width: 15px;
    height: 15px;
    fill: var(--gold);
    opacity: 0.8;
    transition: opacity 0.3s;
  }

  .social-link:hover .social-icon svg {
    opacity: 1;
  }

  .social-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 8px;
    letter-spacing: 0.25em;
    color: rgba(201,168,76,0.55);
    text-transform: uppercase;
    white-space: nowrap;
    transition: color 0.3s;
  }

  .social-link:hover .social-label {
    color: var(--gold);
  }

  .social-divider {
    width: 1px;
    height: 24px;
    background: rgba(201,168,76,0.2);
  }

  @media (max-width: 600px) {
    .social-row {
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      padding: 0 1rem;
      max-width: 300px;
    }

    .social-divider {
      display: none;
    }

    .social-icon {
      width: 40px;
      height: 40px;
    }

    .social-label {
      font-size: 7px;
      letter-spacing: 0.15em;
    }

    .coming-soon-main {
      font-size: clamp(11px, 4.5vw, 18px);
      letter-spacing: 0.3em;
    }

    .coming-soon-center {
      top: 18%;
      width: 90%;
      white-space: normal;
      text-align: center;
    }

    .center-content {
      padding-bottom: 5rem;
    }

    .footer {
      padding-bottom: 1rem;
    }

    .corner {
      display: none;
    }
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    padding-bottom: 1.2rem;
    z-index: 10;
    opacity: 0;
    transition: opacity 1.5s ease 1.2s;
  }

  .footer.visible {
    opacity: 1;
  }

  .footer-vat {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 8px;
    letter-spacing: 0.3em;
    color: rgba(245,240,232,0.2);
    text-transform: uppercase;
  }

  /* Horizontal gold lines decorative */
  .deco-line-left,
  .deco-line-right {
    position: absolute;
    top: 50%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim));
    width: 0;
    transition: width 1.5s ease 0.5s;
    opacity: 0.3;
  }

  .deco-line-left {
    right: 55%;
    background: linear-gradient(to left, transparent, var(--gold-dim));
  }

  .deco-line-right {
    left: 55%;
  }

  .deco-line-left.visible,
  .deco-line-right.visible {
    width: 15%;
  }

  /* Corner marks */
  .corner {
    position: absolute;
    width: 24px;
    height: 24px;
    opacity: 0;
    transition: opacity 1s ease 0.8s;
  }

  .corner.visible { opacity: 0.4; }

  .corner-tl { top: 2.5rem; left: 2.5rem; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-tr { top: 2.5rem; right: 2.5rem; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner-bl { bottom: 1.8rem; left: 2.5rem; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-br { bottom: 1.8rem; right: 2.5rem; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

</style>
</head>
<body>

<!-- Custom cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<!-- Intro sequence -->
<div id="intro">

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });

  function animateRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();

  // Intro animation
  const intro = document.getElementById('intro');
  const main = document.getElementById('main');
  const lineTop = document.getElementById('line-top');
  const lineBot = document.getElementById('line-bot');
  const introName = document.getElementById('intro-name');

  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  // Step 1: lines expand
  setTimeout(() => {
    const w = Math.min(window.innerWidth * 0.55, 520);
    lineTop.style.transition = 'width 1.2s cubic-bezier(0.4,0,0.2,1)';
    lineTop.style.width = w + 'px';
    lineBot.style.transition = 'width 1.2s cubic-bezier(0.4,0,0.2,1)';
    lineBot.style.width = w + 'px';
  }, 200);

  // Step 2: SCIAMAT fades in
  setTimeout(() => {
    introName.style.transition = 'opacity 1s ease, letter-spacing 1.2s ease';
    introName.style.opacity = '1';
    introName.style.letterSpacing = '0.2em';
  }, 800);

  // Step 3: hold then fade out
  setTimeout(() => {
    intro.style.transition = 'opacity 1s ease';
    intro.style.opacity = '0';
  }, 2800);

  // Step 4: reveal main
  setTimeout(() => {
    intro.style.display = 'none';
    main.style.transition = 'opacity 1.2s ease';
    main.style.opacity = '1';

    document.getElementById('heroImg').classList.add('zoomed');

    setTimeout(() => {
      document.getElementById('topNav').classList.add('visible');
      document.querySelectorAll('.corner').forEach(c => c.classList.add('visible'));
      document.getElementById('decoL').classList.add('visible');
      document.getElementById('decoR').classList.add('visible');
      document.getElementById('comingSoon').classList.add('visible');
      document.getElementById('separator').classList.add('visible');
    }, 300);

    setTimeout(() => {
      document.getElementById('socialRow').classList.add('visible');
      document.getElementById('footer').classList.add('visible');
    }, 800);

  }, 3800);

  // Parallax on mouse move
  document.addEventListener('mousemove', e => {
    if (parseFloat(main.style.opacity) < 0.5) return;
    const xRatio = (e.clientX / window.innerWidth - 0.5) * 2;
    const yRatio = (e.clientY / window.innerHeight - 0.5) * 2;
    const img = document.getElementById('heroImg');
    img.style.transform = `scale(1.0) translate(${xRatio * 6}px, ${yRatio * 4}px)`;
  });
</script>
</body>
</html>
